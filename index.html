<!DOCTYPE html>
<html>

<head>
<title>Sistema de Matrícula ULIMA</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f2f4f8;
    margin:0;
}

header{
    background-color:#002b5c;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:70%;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

h2{
    color:#002b5c;
}

input{
    padding:8px;
    width:250px;
    margin-bottom:15px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#002b5c;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

button{
    background:#1e73be;
    color:white;
    border:none;
    padding:12px 20px;
    margin-top:20px;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#155a96;
}

</style>

</head>

<body>

<header>
<h1>Sistema de Matrícula</h1>
<p>Portal del Estudiante</p>
</header>

<div class="container">

<h2>Datos del Estudiante</h2>

<label>Nombre:</label><br>
<input type="text"><br>

<label>Código:</label><br>
<input type="text"><br>

<h2>Cursos disponibles</h2>

<table>

<tr>
<th>Curso</th>
<th>Créditos</th>
<th>Horario</th>
<th>Seleccionar</th>
</tr>

<tr>
<td>Matemática I</td>
<td>4</td>
<td>Lun 8-10</td>
<td><input type="checkbox"></td>
</tr>

<tr>
<td>Programación I</td>
<td>4</td>
<td>Mar 10-12</td>
<td><input type="checkbox"></td>
</tr>

<tr>
<td>Economía</td>
<td>3</td>
<td>Mie 8-10</td>
<td><input type="checkbox"></td>
</tr>

<tr>
<td>Estadística</td>
<td>4</td>
<td>Jue 10-12</td>
<td><input type="checkbox"></td>
</tr>

</table>

<button>Confirmar Matrícula</button>

</div>

</body>

</html>
