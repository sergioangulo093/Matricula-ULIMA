<!DOCTYPE html>
<html>

<head>
<title>Login - Sistema de Matrícula</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
width:350px;
}

h2{
color:#f36f21;
}

input{
width:90%;
padding:10px;
margin:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#f36f21;
color:white;
border:none;
padding:12px;
width:95%;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#d95e1c;
}

.error{
color:red;
margin-top:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Portal del Estudiante</h2>

<input type="text" id="usuario" placeholder="Código de alumno">

<input type="password" id="password" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

<p class="error" id="error"></p>

</div>

<script>

function login(){

var user = document.getElementById("usuario").value;
var pass = document.getElementById("password").value;

if(user == "20210124" && pass == "sergio1234"){
window.location.href = "matricula.html";
}

else{
document.getElementById("error").innerText = "Usuario o contraseña incorrectos";
}

}

</script>

</body>
</html>
